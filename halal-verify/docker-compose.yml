version: "3.9"

services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/app

  bot:
    build: .
    command: python bot/main.py
    env_file:
      - .env
    depends_on:
      - api
    volumes:
      - ./:/app

<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>HalalVerify</title>
    <style>
      body { font-family: Arial, sans-serif; width: 320px; margin: 0; padding: 16px; }
      h1 { font-size: 18px; margin-top: 0; }
      .badge { display: inline-block; padding: 4px 8px; border-radius: 999px; color: white; }
      .halal { background: #16803c; }
      .haram { background: #b42318; }
      .questionable { background: #a16207; }
      .unknown { background: #6b7280; }
      button { margin-top: 12px; width: 100%; }
    </style>
  </head>
  <body>
    <h1>HalalVerify</h1>
    <p id="product-name">Looking up product…</p>
    <div id="status" class="badge unknown">unknown</div>
    <p id="details"></p>
    <button id="report-btn">Report incorrect result</button>
    <script src="popup.js"></script>
  </body>
</html>

{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>Export PDF receipt</h2>
  <form method="post">
    <label>Donor name</label><input type="text" name="donor_name" placeholder="Optional">
    <table class="table" style="margin-top: 1rem;">
      <thead><tr><th>Select</th><th>Date</th><th>Charity</th><th>Type</th><th>Amount</th></tr></thead>
      <tbody>
      {% for donation in donations %}
        <tr>
          <td><input type="checkbox" name="donation_ids" value="{{ donation.id }}"></td>
          <td>{{ donation.date }}</td>
          <td>{{ donation.charity_name }}</td>
          <td>{{ donation.donation_type }}</td>
          <td>{{ donation.amount }} {{ donation.currency }}</td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
    <button type="submit">Download PDF</button>
  </form>
</div>
{% endblock %}
